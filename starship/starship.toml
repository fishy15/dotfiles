format = "$directory$git_branch$git_commit$git_status$character"
add_newline = false

[character]
success_symbol = '[\$](green)'
error_symbol = '[\$](red)'

[directory]
truncation_length = 1

[git_branch]
format = '[$branch(:$remote_branch)]($style)'
only_attached = true

[git_commit]
format = '[$hash]($style)'
style = 'bold red'
only_detached = true

[git_status]
format = '([$all_status$ahead_behind]($style)) '
modified='*'
